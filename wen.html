<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown 博客</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>Markdown 博客示例</h1>
</header>

<div class="container">
    <!-- 侧边栏目录 -->
    <nav id="sidebar">
        <h2>目录</h2>
        <ul id="toc"></ul>
    </nav>

    <!-- Markdown 渲染内容 -->
    <main id="content"></main>
</div>

<footer>
    <p>© 2026 Markdown 博客</p>
</footer>

<!-- 引入 marked.js -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// 加载 Markdown 文件
async function loadMarkdown(file) {
    try {
        const response = await fetch(file);
        if (!response.ok) throw new Error("无法加载 Markdown 文件");
        const text = await response.text();
        document.getElementById('content').innerHTML = marked.parse(text);

        generateTOC(); // Markdown 加载完后生成目录
    } catch (err) {
        document.getElementById('content').innerHTML = `<p class="error">${err}</p>`;
    }
}

// 自动生成侧边栏目录
function generateTOC() {
    const content = document.getElementById('content');
    const toc = document.getElementById('toc');
    toc.innerHTML = '';
    const headers = content.querySelectorAll('h1, h2, h3');

    headers.forEach(header => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        const id = header.textContent.trim().replace(/\s+/g, '-');
        header.id = id;
        a.href = `#${id}`;
        a.textContent = header.textContent;
        li.appendChild(a);

        // 缩进处理
        if (header.tagName === 'H2') li.style.marginLeft = '10px';
        if (header.tagName === 'H3') li.style.marginLeft = '20px';

        toc.appendChild(li);
    });
}

// 初始加载 Markdown 文件
loadMarkdown('md/README.md');
</script>
</body>
</html>
